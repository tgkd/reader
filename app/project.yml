name: Reader
options:
  bundleIdPrefix: app.reader
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
packages:
  ReaderCore:
    path: ../ReaderCore
  # EPUB is a ZIP container; no public system unzip exists on iOS. Pinned to the
  # 0.9.x line for its failable `Archive(url:accessMode:)` API (1.0 made it throw).
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"
targets:
  # The product app (Yomi). Uses an explicit Info.plist (not the generated one)
  # so UIBackgroundModes: [audio] is honored for background TTS playback.
  Reader:
    type: application
    platform: iOS
    sources:
      - path: Reader
      - path: ../ReaderCore/Tests/ReaderCoreTests/fixtures
        buildPhase: resources
        excludes:
          - ".gitkeep"
    dependencies:
      - package: ReaderCore
      - package: ZIPFoundation
    # DEVELOPMENT_TEAM comes from the gitignored Signing.xcconfig (keeps the team
    # ID out of this public repo) and so survives `xcodegen generate`. Copy
    # Signing.xcconfig.example → Signing.xcconfig before a device/archive build.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.reader.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
    info:
      path: Reader/Info.plist
      properties:
        CFBundleDisplayName: Yomi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ja
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
