name: Reader
options:
  bundleIdPrefix: app.reader
  developmentLanguage: en
  # iOS 26+: the reader chrome is built on Liquid Glass (.glassEffect, .buttonStyle(.glass)).
  deploymentTarget:
    iOS: "26.0"
packages:
  ReaderCore:
    path: ../ReaderCore
  # EPUB is a ZIP container; no public system unzip exists on iOS. Pinned to the
  # 0.9.x line for its failable `Archive(url:accessMode:)` API (1.0 made it throw).
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"
  # Subscriptions: configured with the iOS public SDK key; the app's RevenueCat
  # appUserID becomes the Worker's X-User-ID (the /tts/aligned subscription gate).
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"
targets:
  # The product app (Yomi). Uses an explicit Info.plist (not the generated one)
  # so UIBackgroundModes: [audio] is honored for background TTS playback.
  Reader:
    type: application
    platform: iOS
    sources:
      - path: Reader
      - path: ../ReaderCore/Tests/ReaderCoreTests/fixtures
        buildPhase: resources
        excludes:
          - ".gitkeep"
    dependencies:
      - package: ReaderCore
      - package: ZIPFoundation
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
    # DEVELOPMENT_TEAM comes from the gitignored Signing.xcconfig (keeps the team
    # ID out of this public repo) and so survives `xcodegen generate`. Copy
    # Signing.xcconfig.example → Signing.xcconfig before a device/archive build.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    # Fail a Release build if the tap-to-define DB was never built — otherwise the
    # archive silently ships the seeded MockDictionary (AppServices falls back when
    # the resource is absent, and the DB is gitignored so a clean checkout has none).
    preBuildScripts:
      - name: Verify tap-to-define DB (Release)
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ] && [ ! -f "$SRCROOT/Reader/Resources/jisho-compact.db" ]; then
            echo "error: Reader/Resources/jisho-compact.db is missing — run scripts/build-compact-dict.sh before a Release build (the app would otherwise ship the mock dictionary)."
            exit 1
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.reader.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
      configs:
        # @testable import Reader from the ReaderTests target needs testability.
        Debug:
          ENABLE_TESTABILITY: YES
    info:
      path: Reader/Info.plist
      properties:
        CFBundleDisplayName: Yomi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ja
        # Release/device config — values come from the gitignored Signing.xcconfig
        # (WORKER_HOST / REVENUECAT_KEY), so the app reaches production on an icon /
        # TestFlight launch without the DEBUG READER_* env vars. Empty → the code's
        # placeholder fallback. The host lives in the xcconfig (gitignored); only the
        # scheme is committed here.
        WorkerBaseURL: "https://$(WORKER_HOST)"
        RevenueCatKey: "$(REVENUECAT_KEY)"
        ITSAppUsesNonExemptEncryption: false
        # Let Yomi receive EPUB/PDF/TXT from Files, Mail, Safari and the share sheet
        # (handled by RootView.onOpenURL → AppModel.importFile). Alternate rank: Yomi
        # opens these common types but doesn't claim to own them.
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: PDF
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
          - CFBundleTypeName: Plain Text
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
              - public.text
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    # StoreKit Configuration file for testing purchases locally (run from Xcode →
    # the paywall loads products from this file; no sandbox account needed). Wired
    # here so `xcodegen generate` keeps it on the Reader scheme.
    scheme:
      testTargets:
        - ReaderTests
      storeKitConfiguration: Reader.storekit

  # Unit tests for the app-target importers (EPUB/PDF/Text), which depend on
  # ZIPFoundation/PDFKit and so can't live in the headless ReaderCore package.
  # Fixtures are generated at runtime (no committed binaries) — see ReaderTests.
  ReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReaderTests
    dependencies:
      - target: Reader
      - package: ReaderCore
      - package: ZIPFoundation
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.reader.app.tests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic

schemes:
  Reader:
    build:
      targets:
        Reader: all
        ReaderTests: [test]
    test:
      targets:
        - ReaderTests
      gatherCoverageData: false
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
